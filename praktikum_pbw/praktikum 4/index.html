<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Input Nilai</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Cek Huruf Mutu</h2>
        <p class="subtitle">Masukkan NIM dan nilai untuk melihat hasil</p>
        
        <div class="input-group">
            <label>NIM</label>
            <input type="text" id="nim" placeholder="Contoh: 22010123">
        </div>

        <div class="input-group">
            <label>Nilai (0 - 100)</label>
            <input type="number" id="nilai" placeholder="Masukkan nilai">
        </div>

        <button id="btnCek">Cek Nilai</button>

        <div id="hasil" class="result-box hidden"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
